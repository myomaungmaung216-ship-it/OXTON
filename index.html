<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet UI - TON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #051221; color: white; font-family: sans-serif; overflow: hidden; }
        .page { display: none; height: 100vh; }
        .active-page { display: block; }
        
        /* Wallet Card */
        .wallet-card { background: #0c1e33; border: 1px solid #1e293b; border-radius: 24px; padding: 30px; text-align: center; }
        
        /* Bottom Sheet (Slide up animation) */
        #withdrawSheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 90%;
            background: #051221; border-top: 1px solid #1e293b; border-top-left-radius: 20px; border-top-right-radius: 20px;
            z-index: 50; transition: bottom 0.4s ease-out; padding: 20px;
        }
        #withdrawSheet.active { bottom: 0; }

        /* Inputs */
        .input-group label { color: #94a3b8; font-size: 11px; font-weight: 600; margin-left: 5px; text-transform: uppercase; }
        .custom-input { background: #111e2f; border: 1px solid #1e293b; border-radius: 14px; padding: 14px; width: 100%; color: white; outline: none; margin-top: 6px; margin-bottom: 15px; }
        .custom-input:focus { border-color: #06b6d4; }

        .btn-withdraw { background: #06b6d4; color: black; font-weight: 800; width: 100%; padding: 15px; border-radius: 12px; transition: 0.2s; }
        .btn-withdraw:active { transform: scale(0.98); opacity: 0.9; }

        .nav-btn { color: #64748b; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-btn.active { color: #06b6d4; }
    </style>
</head>
<body>

    <!-- Main Wallet Page -->
    <div id="wallet" class="page active-page p-6">
        <h1 class="text-2xl font-bold mb-1">Wallet</h1>
        <p class="text-xs text-blue-400 mb-8">Your TON earnings</p>

        <div class="wallet-card mb-6">
            <div class="flex justify-center mb-4">
                <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="50" alt="TON">
            </div>
            <h2 class="text-5xl font-extrabold mb-2" id="mainBal">0.0025</h2>
            <p class="text-lg font-bold text-blue-400">TON</p>
            <p class="text-xs text-gray-500 mt-2">Available Balance</p>
        </div>

        <div class="bg-yellow-900/20 border border-yellow-700/30 p-3 rounded-xl mb-6 flex items-center gap-3">
            <i class="fas fa-info-circle text-yellow-500"></i>
            <p class="text-[11px] text-yellow-500 font-medium">Minimum withdraw amount 0.05 TON</p>
        </div>

        <!-- Withdraw Trigger Button -->
        <button onclick="openSheet()" class="w-full bg-cyan-400 text-black font-extrabold py-4 rounded-2xl flex items-center justify-between px-6 mb-4 shadow-lg shadow-cyan-900/20">
            <div class="flex items-center gap-3"><i class="fas fa-arrow-down"></i> Withdraw</div>
            <i class="fas fa-chevron-right text-xs opacity-50"></i>
        </button>

        <button class="w-full bg-[#0c1e33] text-white font-bold py-4 rounded-2xl flex items-center justify-between px-6 border border-gray-800">
            <div class="flex items-center gap-3 text-gray-400"><i class="fas fa-history"></i> History</div>
            <i class="fas fa-chevron-right text-xs opacity-30"></i>
        </button>
    </div>

    <!-- Withdraw Slide-up Sheet -->
    <div id="withdrawSheet">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <button onclick="closeSheet()" class="text-white text-xl"><i class="fas fa-times"></i></button>
                <h2 class="text-xl font-bold">Withdraw TON</h2>
            </div>
        </div>

        <div class="bg-yellow-900/20 border border-yellow-700/30 p-3 rounded-xl mb-6 flex items-center gap-3">
            <i class="fas fa-info-circle text-yellow-500"></i>
            <p class="text-[11px] text-yellow-500 font-medium">Minimum withdraw amount 0.05 TON</p>
        </div>

        <div class="text-center mb-8">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2">Available Balance</p>
            <div class="flex items-center justify-center gap-2 text-2xl font-bold">
                <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="24">
                <span>0.0025</span>
                <span class="text-blue-400 text-sm">TON</span>
            </div>
        </div>

        <div class="input-group">
            <label>TON ADDRESS</label>
            <input type="text" id="addr" placeholder="UQ . . ." class="custom-input">

            <label>COMMENT <span class="text-[9px] opacity-50">(optional)</span></label>
            <input type="text" id="memo" placeholder="Add a comment..." class="custom-input">

            <label>TON AMOUNT</label>
            <input type="number" id="amt" value="0.05" class="custom-input">
        </div>

        <button onclick="handleWithdraw()" class="btn-withdraw mt-4">Confirm Withdraw</button>
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-0 w-full bg-[#051221] border-t border-gray-800 flex py-3 z-40">
        <button class="nav-btn"><i class="fas fa-home text-lg"></i>HOME</button>
        <button class="nav-btn"><i class="fas fa-tasks text-lg"></i>TASKS</button>
        <button class="nav-btn active"><i class="fas fa-wallet text-lg"></i>WALLET</button>
        <button class="nav-btn"><i class="fas fa-users text-lg"></i>INVITE</button>
    </nav>

    <script>
        const sheet = document.getElementById('withdrawSheet');
        let currentBal = 0.0025;

        function openSheet() {
            sheet.classList.add('active');
        }

        function closeSheet() {
            sheet.classList.remove('active');
        }

        function handleWithdraw() {
            const addr = document.getElementById('addr').value;
            const amount = parseFloat(document.getElementById('amt').value);

            if(!addr || addr.length < 10) {
                alert("Please enter a valid TON address.");
                return;
            }
            if(amount < 0.05) {
                alert("Minimum withdrawal is 0.05 TON.");
                return;
            }
            if(amount > currentBal) {
                alert("Insufficient balance!");
                return;
            }

            alert("Request Submitted!\nProcessing time: 24 hours.");
            closeSheet();
        }
    </script>
</body>
</html>
