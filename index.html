<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bomber TON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b1a2d; color: white; font-family: sans-serif; overflow: hidden; }
        .grid-box { background: #1c2c3e; border: 1px solid #334155; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; border-radius: 8px; }
        .ctrl-btn { background: #1e293b; border: 1px solid #334155; border-radius: 12px; width: 60px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #4fd1c5; }
        .ctrl-btn:active { background: #334155; transform: scale(0.9); }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div><p class="text-[10px] text-gray-500 uppercase">My TON</p><p class="font-bold text-teal-400 text-lg" id="bal">0.0025</p></div>
        <div class="bg-blue-900/40 px-4 py-1 rounded-full border border-blue-500/30 text-xs font-bold text-blue-400">BOMBER v1.0</div>
    </div>

    <!-- Game Board (5x5 Grid) -->
    <div class="grid grid-cols-5 gap-2 mb-8" id="board">
        <!-- Grid cells will be generated by JS -->
    </div>

    <!-- Controls -->
    <div class="flex flex-col items-center gap-2">
        <button class="ctrl-btn" onclick="move(0,-1)"><i class="fas fa-arrow-up"></i></button>
        <div class="flex gap-4">
            <button class="ctrl-btn" onclick="move(-1,0)"><i class="fas fa-arrow-left"></i></button>
            <button class="ctrl-btn bg-red-600 border-none w-20 shadow-lg shadow-red-900/40" onclick="dropBomb()">
                <i class="fas fa-bomb text-white text-2xl"></i>
            </button>
            <button class="ctrl-btn" onclick="move(1,0)"><i class="fas fa-arrow-right"></i></button>
        </div>
        <button class="ctrl-btn" onclick="move(0,1)"><i class="fas fa-arrow-down"></i></button>
    </div>

    <script>
        let px = 0, py = 0, ex = 4, ey = 4, score = 0.0025;
        const board = document.getElementById('board');

        function render() {
            board.innerHTML = '';
            for (let y = 0; y < 5; y++) {
                for (let x = 0; x < 5; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-box';
                    if (x === px && y === py) cell.innerText = '🧑‍🚀';
                    else if (x === ex && y === ey) cell.innerText = '👾';
                    board.appendChild(cell);
                }
            }
        }

        function move(dx, dy) {
            let nx = px + dx, ny = py + dy;
            if (nx >= 0 && nx < 5 && ny >= 0 && ny < 5) {
                px = nx; py = ny;
            }
            render();
        }

        function dropBomb() {
            if (px === ex && py === ey) {
                score += 0.001;
                document.getElementById('bal').innerText = score.toFixed(4);
                ex = Math.floor(Math.random() * 5);
                ey = Math.floor(Math.random() * 5);
                alert("Boom! Enemy Killed! +0.001 TON");
            } else {
                alert("Go to Enemy place to use Bomb!");
            }
            render();
        }

        render();
    </script>
</body>
</html>
