<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ox TON Pro - Bomber Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1a2d; color: white; font-family: sans-serif; user-select: none; overflow: hidden; }
        .page { display: none; min-height: 100vh; padding-bottom: 90px; }
        .active-page { display: block; }
        .nav-btn { color: #64748b; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; }
        .nav-btn.active { color: #4fd1c5; }
        .shop-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        
        /* Bomber Game Styles */
        #gameCanvas { background-color: #2c3e50; border: 2px solid #34495e; border-radius: 12px; display: block; margin: 10px auto; touch-action: none; }
        .controls { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; width: 150px; margin: 10px auto; }
        .control-btn { background: #1c2c3e; border: 1px solid #334155; color: white; padding: 15px; border-radius: 12px; font-size: 18px; text-center: center; }
        .control-btn:active { background: #25384d; transform: scale(0.95); }
    </style>
</head>
<body>

    
<div class="p-5 flex justify-between items-center sticky top-0 bg-[#0b1a2d] z-10">
        <div class="flex gap-4 text-center">
            <div><p class="text-[9px] text-gray-500 uppercase">You</p><p class="font-bold text-teal-400" id="userScore">0</p></div>
            <div class="text-gray-700 font-bold">|</div>
            <div><p class="text-[9px] text-gray-500 uppercase">Status</p><p class="font-bold text-red-400 text-xs" id="gameStatus">PLAYING</p></div>
        </div>
        <div class="bg-blue-900/30 border border-blue-500/40 px-4 py-1.5 rounded-full flex items-center gap-2">
            <i class="fas fa-gem text-blue-400 text-sm"></i>
            <span class="font-bold text-sm" id="mainBalance">0.0025</span>
        </div>
    </div>

    
<div id="home" class="page active-page p-4">
        <h2 class="text-center text-sm font-bold text-gray-400 uppercase mb-2">Bomber Arena</h2>
        
        <canvas id="gameCanvas" width="320" height="320"></canvas>
