<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ox TON Pro - Earn & Withdraw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1a2d; color: white; font-family: sans-serif; user-select: none; }
        .page { display: none; min-height: 100vh; padding-bottom: 90px; }
        .active-page { display: block; }
        .grid-cell { background: #1c2c3e; border-radius: 15px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; transition: 0.2s; cursor: pointer; border: 1px solid #334155; }
        .grid-cell:active { transform: scale(0.95); background: #25384d; }
        .nav-btn { color: #64748b; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: #4fd1c5; }
        .input-box { width: 100%; bg-black/30; border: 1px solid #334155; border-radius: 12px; padding: 12px; font-size: 14px; color: white; outline: none; margin-bottom: 12px; }
        .input-box:focus { border-color: #4fd1c5; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="p-5 flex justify-between items-center sticky top-0 bg-[#0b1a2d]/90 backdrop-blur-md z-10 border-b border-gray-800">
        <div class="flex gap-4">
            <div class="text-center">
                <p class="text-[9px] text-gray-500 uppercase">Win</p>
                <p class="font-bold text-teal-400" id="uScore">0</p>
            </div>
            <div class="text-center">
                <p class="text-[9px] text-gray-500 uppercase">Loss</p>
                <p class="font-bold text-red-400" id="bScore">0</p>
            </div>
        </div>
        <div class="bg-teal-500/10 border border-teal-500/30 px-4 py-1.5 rounded-full flex items-center gap-2">
            <i class="fas fa-coins text-teal-400 text-sm"></i>
            <span class="font-bold text-sm text-teal-400" id="mainBal">0.0025</span>
        </div>
    </div>

    <!-- PLAY PAGE -->
    <div id="home" class="page active-page p-5">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold">Ox Game</h1>
            <p class="text-xs text-gray-500">Win to get 0.0005 TON</p>
        </div>
        <div class="grid grid-cols-3 gap-3" id="board">
            <div class="grid-cell" data-index="0" onclick="tap(0)"></div>
            <div class="grid-cell" data-index="1" onclick="tap(1)"></div>
            <div class="grid-cell" data-index="2" onclick="tap(2)"></div>
            <div class="grid-cell" data-index="3" onclick="tap(3)"></div>
            <div class="grid-cell" data-index="4" onclick="tap(4)"></div>
            <div class="grid-cell" data-index="5" onclick="tap(5)"></div>
            <div class="grid-cell" data-index="6" onclick="tap(6)"></div>
            <div class="grid-cell" data-index="7" onclick="tap(7)"></div>
            <div class="grid-cell" data-index="8" onclick="tap(8)"></div>
        </div>
        <p id="status" class="text-center mt-6 text-teal-400 font-bold h-6"></p>
    </div>

    <!-- WITHDRAW PAGE -->
    <div id="wallet" class="page p-6">
        <div class="text-center mb-8">
            <i class="fas fa-wallet text-5xl text-teal-400 mb-2"></i>
            <h2 class="text-2xl font-bold">Withdrawals</h2>
            <p class="text-xs text-gray-500">Fast & Free Payments</p>
        </div>

        <div class="bg-[#1c2c3e] p-5 rounded-2xl border border-gray-700">
            <p class="text-[10px] text-gray-400 uppercase mb-4 tracking-widest">Withdraw Details</p>
            
            <!-- Address Input -->
            <label class="text-[11px] text-gray-500 ml-1">TON WALLET ADDRESS</label>
            <input type="text" id="address" placeholder="UQ..." class="input-box bg-slate-900/50 mt-1">

            <!-- Comment Input -->
            <label class="text-[11px] text-gray-500 ml-1">COMMENT (MEMO) - OPTIONAL</label>
            <input type="text" id="comment" placeholder="Your Note" class="input-box bg-slate-900/50 mt-1">

            <!-- Amount Input -->
            <label class="text-[11px] text-gray-500 ml-1">WITHDRAW AMOUNT (TON)</label>
            <input type="number" id="amount" placeholder="Min: 0.05" class="input-box bg-slate-900/50 mt-1">

            <button onclick="processWithdraw()" class="w-full bg-teal-500 text-black font-extrabold py-4 rounded-xl mt-4 shadow-lg active:scale-95 transition">
                CONFIRM WITHDRAW
            </button>
        </div>

        <div class="mt-6 text-center">
            <p class="text-[11px] text-gray-500">Minimum withdrawal is <b>0.05 TON</b></p>
            <p class="text-[11px] text-gray-500 mt-1">No deposit required for first withdrawal.</p>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-[#0b1a2d]/95 border-t border-gray-800 flex py-3 z-20">
        <button onclick="nav('home')" class="nav-btn active" id="n-home"><i class="fas fa-gamepad text-xl"></i>PLAY</button>
        <button onclick="nav('wallet')" class="nav-btn" id="n-wallet"><i class="fas fa-wallet text-xl"></i>WALLET</button>
    </nav>

    <script>
        let b = ["","","","","","","","",""], uS = 0, bS = 0, bal = 0.0025, active = true;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-'+id).classList.add('active');
        }

        function tap(i) {
            if(b[i] === "" && active) {
                play(i, "X");
                if(!checkWin("X")) {
                    active = false;
                    setTimeout(botMove, 500);
                }
            }
        }

        function botMove() {
            let empty = b.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if(empty.length > 0) {
                play(empty[Math.floor(Math.random() * empty.length)], "O");
                checkWin("O");
                active = true;
            }
        }

        function play(i, s) {
            b[i] = s;
            const el = document.querySelector(`[data-index="${i}"]`);
            el.innerText = s;
            el.style.color = s === "X" ? "#4fd1c5" : "#f87171";
        }

        function checkWin(s) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of wins) {
                if(b[p[0]]==s && b[p[1]]==s && b[p[2]]==s) { end(s); return true; }
            }
            if(!b.includes("")) { end("D"); return true; }
            return false;
        }

        function end(w) {
            active = false;
            if(w === "X") { 
                uS++; bal += 0.0005; 
                document.getElementById('status').innerText = "Winner! +0.0005"; 
            } else if(w === "O") { 
                bS++; document.getElementById('status').innerText = "Bot Won!"; 
            } else { 
                document.getElementById('status').innerText = "Draw!"; 
            }
            
            document.getElementById('uScore').innerText = uS;
            document.getElementById('bScore').innerText = bS;
            document.getElementById('mainBal').innerText = bal.toFixed(4);
            setTimeout(reset, 1500);
        }

        function reset() {
            b = ["","","","","","","","",""];
            document.querySelectorAll('.grid-cell').forEach(c => c.innerText = "");
            document.getElementById('status').innerText = "";
            active = true;
        }

        // WITHDRAW LOGIC
        function processWithdraw() {
            const addr = document.getElementById('address').value;
            const amt = parseFloat(document.getElementById('amount').value);
            const memo = document.getElementById('comment').value;

            if(!addr || addr.length < 10) {
                alert("Please enter a valid TON Wallet Address!");
                return;
            }
            if(isNaN(amt) || amt < 0.05) {
                alert("Minimum withdrawal is 0.05 TON!");
                return;
            }
            if(amt > bal) {
                alert("Insufficient Balance! You only have " + bal.toFixed(4) + " TON.");
                return;
            }

            // If everything is OK
            alert("Withdraw Success!\nAddress: " + addr + "\nAmount: " + amt + " TON\nComment: " + memo + "\nStatus: Processing (24h)");
            
            // Deduct balance (Optional: you can deduct it for simulation)
            bal -= amt;
            document.getElementById('mainBal').innerText = bal.toFixed(4);
            
            // Clear inputs
            document.getElementById('address').value = "";
            document.getElementById('amount').value = "";
            document.getElementById('comment').value = "";
        }
    </script>
</body>
</html>
