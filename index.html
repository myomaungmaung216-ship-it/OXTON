<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ox TON Free Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1a2d; color: white; font-family: sans-serif; user-select: none; }
        .page { display: none; min-height: 100vh; padding-bottom: 90px; }
        .active-page { display: block; }
        .grid-cell { background: #1c2c3e; border-radius: 15px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; transition: 0.2s; cursor: pointer; border: 1px solid #334155; }
        .grid-cell:active { transform: scale(0.95); background: #25384d; }
        .nav-btn { color: #64748b; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: #4fd1c5; }
        .withdraw-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="p-5 flex justify-between items-center sticky top-0 bg-[#0b1a2d]/90 backdrop-blur-md z-10">
        <div class="flex gap-4">
            <div class="text-center">
                <p class="text-[9px] text-gray-500 uppercase">Win</p>
                <p class="font-bold text-teal-400" id="userScore">0</p>
            </div>
            <div class="text-center">
                <p class="text-[9px] text-gray-500 uppercase">Loss</p>
                <p class="font-bold text-red-400" id="botScore">0</p>
            </div>
        </div>
        <div class="bg-teal-500/10 border border-teal-500/30 px-4 py-1.5 rounded-full flex items-center gap-2">
            <i class="fas fa-coins text-teal-400 text-sm"></i>
            <span class="font-bold text-sm text-teal-400" id="mainBalance">0.0025</span>
        </div>
    </div>

    <!-- HOME (OX GAME) -->
    <div id="home" class="page active-page p-5">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-white">Ox Challenge</h1>
            <p class="text-xs text-gray-400">Win to earn 0.0005 TON</p>
        </div>
        
        <div class="grid grid-cols-3 gap-3 mb-8" id="board">
            <div class="grid-cell" data-index="0" onclick="tap(0)"></div>
            <div class="grid-cell" data-index="1" onclick="tap(1)"></div>
            <div class="grid-cell" data-index="2" onclick="tap(2)"></div>
            <div class="grid-cell" data-index="3" onclick="tap(3)"></div>
            <div class="grid-cell" data-index="4" onclick="tap(4)"></div>
            <div class="grid-cell" data-index="5" onclick="tap(5)"></div>
            <div class="grid-cell" data-index="6" onclick="tap(6)"></div>
            <div class="grid-cell" data-index="7" onclick="tap(7)"></div>
            <div class="grid-cell" data-index="8" onclick="tap(8)"></div>
        </div>
        <p id="status" class="text-center text-teal-400 font-bold animate-pulse"></p>
    </div>

    <!-- WITHDRAW PAGE -->
    <div id="wallet" class="page p-6">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="fas fa-wallet text-teal-400"></i> Withdraw TON</h2>
        
        <div class="withdraw-card mb-6">
            <p class="text-gray-400 text-xs mb-1 uppercase">Available Balance</p>
            <h3 class="text-4xl font-bold text-white mb-4"><span id="walletBal">0.0025</span> <span class="text-sm text-gray-500">TON</span></h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 block mb-1 ml-1">TON WALLET ADDRESS</label>
                    <input type="text" placeholder="UQ..." class="w-full bg-black/30 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-teal-500">
                </div>
                <button onclick="withdraw()" class="w-full bg-teal-500 hover:bg-teal-600 text-black font-extrabold py-4 rounded-xl transition shadow-lg shadow-teal-500/20">
                    CONFIRM WITHDRAW
                </button>
            </div>
        </div>

        <div class="bg-yellow-500/10 border border-yellow-500/20 p-4 rounded-xl">
            <p class="text-[11px] text-yellow-500 leading-relaxed">
                <i class="fas fa-info-circle mr-1"></i> <b>Free User Notice:</b> Withdrawals are processed within 24 hours. Minimum limit: 0.05 TON. No deposit required.
            </p>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-[#0b1a2d]/95 backdrop-blur-md border-t border-gray-800 flex py-3 z-20">
        <button onclick="nav('home')" class="nav-btn active" id="n-home"><i class="fas fa-gamepad text-xl"></i>PLAY</button>
        <button onclick="nav('wallet')" class="nav-btn" id="n-wallet"><i class="fas fa-money-bill-wave text-xl"></i>WITHDRAW</button>
    </nav>

    <script>
        let b = ["","","","","","","","",""], uS = 0, bS = 0, bal = 0.0025, active = true;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-'+id).classList.add('active');
        }

        function tap(i) {
            if(b[i] === "" && active) {
                play(i, "X");
                if(!check("X")) {
                    active = false;
                    setTimeout(bot, 500);
                }
            }
        }

        function bot() {
            let empty = b.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if(empty.length > 0) {
                play(empty[Math.floor(Math.random() * empty.length)], "O");
                check("O");
                active = true;
            }
        }

        function play(i, s) {
            b[i] = s;
            const el = document.querySelector(`[data-index="${i}"]`);
            el.innerText = s;
            el.style.color = s === "X" ? "#4fd1c5" : "#f87171";
        }

        function check(s) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of wins) {
                if(b[p[0]]==s && b[p[1]]==s && b[p[2]]==s) { end(s); return true; }
            }
            if(!b.includes("")) { end("D"); return true; }
            return false;
        }

        function end(w) {
            active = false;
            if(w === "X") { 
                uS++; bal += 0.0005; 
                document.getElementById('status').innerText = "YOU WON! +0.0005 TON"; 
            } else if(w === "O") { 
                bS++; document.getElementById('status').innerText = "BOT WON!"; 
            } else { 
                document.getElementById('status').innerText = "DRAW!"; 
            }
            
            document.getElementById('userScore').innerText = uS;
            document.getElementById('botScore').innerText = bS;
            document.getElementById('mainBalance').innerText = bal.toFixed(4);
            document.getElementById('walletBal').innerText = bal.toFixed(4);
            setTimeout(reset, 1500);
        }

        function reset() {
            b = ["","","","","","","","",""];
            document.querySelectorAll('.grid-cell').forEach(c => c.innerText = "");
            document.getElementById('status').innerText = "";
            active = true;
        }

        function withdraw() {
            if(bal < 0.05) {
                alert("Minimum withdraw is 0.05 TON. Keep playing!");
            } else {
                alert("Withdraw Request Sent! Please wait 24h.");
            }
        }
    </script>
</body>
</html>
