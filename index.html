<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ox TON Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1a2d; color: white; font-family: 'Inter', sans-serif; user-select: none; }
        .page { display: none; min-height: 100vh; padding-bottom: 80px; }
        .active-page { display: block; }
        .grid-cell { background: #1c2c3e; border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 45px; transition: 0.2s; }
        .grid-cell:active { transform: scale(0.95); }
        .nav-btn { color: #64748b; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: #4fd1c5; }
        .btn-gradient { background: linear-gradient(90deg, #14b8a6 0%, #0d9488 100%); }
    </style>
</head>
<body>

    <!-- 1. HOME PAGE (GAME) -->
    <div id="home" class="page active-page p-5">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-6 text-center">
                <div><p class="text-[10px] text-gray-400">YOU</p><p class="text-xl font-bold" id="userScore">0</p></div>
                <div class="text-gray-600 font-bold">VS</div>
                <div><p class="text-[10px] text-gray-400">ROBOT</p><p class="text-xl font-bold" id="botScore">0</p></div>
            </div>
            <div class="bg-blue-900/30 border border-blue-500/50 px-4 py-2 rounded-full flex items-center gap-2">
                <i class="fas fa-gem text-blue-400"></i>
                <span class="font-bold" id="mainBalance">0.0025</span>
            </div>
        </div>

        <div class="flex bg-black/20 p-1 rounded-xl mb-8">
            <button class="flex-1 py-2 rounded-lg bg-teal-500 text-xs font-bold">EASY</button>
            <button class="flex-1 py-2 rounded-lg text-xs font-bold opacity-40">MEDIUM</button>
            <button class="flex-1 py-2 rounded-lg text-xs font-bold opacity-40">HARD</button>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8" id="board">
            <div class="grid-cell" onclick="gameMove(0)"></div>
            <div class="grid-cell" onclick="gameMove(1)"></div>
            <div class="grid-cell" onclick="gameMove(2)"></div>
            <div class="grid-cell" onclick="gameMove(3)"></div>
            <div class="grid-cell" onclick="gameMove(4)"></div>
            <div class="grid-cell" onclick="gameMove(5)"></div>
            <div class="grid-cell" onclick="gameMove(6)"></div>
            <div class="grid-cell" onclick="gameMove(7)"></div>
            <div class="grid-cell" onclick="gameMove(8)"></div>
        </div>

        <div class="flex justify-center gap-3">
            <div class="bg-teal-500/10 border border-teal-500/30 text-teal-400 px-6 py-2 rounded-full text-sm">✕ YOU</div>
            <div class="bg-gray-800 text-gray-500 px-6 py-2 rounded-full text-sm">○ ROBOT</div>
        </div>
    </div>

    <!-- 2. TASKS PAGE -->
    <div id="tasks" class="page p-5">
        <h2 class="text-2xl font-bold mb-2">Tasks</h2>
        <p class="text-gray-400 text-sm mb-6">Complete tasks to earn TON rewards</p>
        <div class="space-y-3">
            <div class="bg-gray-800/40 border border-gray-700 p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center"><i class="fab fa-telegram"></i></div>
                    <div><p class="text-sm font-bold">OX TON Channel</p><p class="text-xs text-teal-400">+0.001 TON</p></div>
                </div>
                <button class="bg-white text-black px-5 py-1 rounded-lg font-bold text-xs">START</button>
            </div>
        </div>
    </div>

    <!-- 3. WALLET PAGE -->
    <div id="wallet" class="page p-5">
        <h2 class="text-2xl font-bold mb-6">Wallet</h2>
        <div class="bg-gray-800/40 border border-gray-700 rounded-3xl p-8 text-center mb-6">
            <i class="fas fa-gem text-blue-400 text-5xl mb-4"></i>
            <h1 class="text-5xl font-bold mb-2">0.0025</h1>
            <p class="text-gray-400 font-bold mb-6">TON</p>
            <div class="bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-[10px] py-2 px-4 rounded-lg mb-6">
                ⚠ Minimum withdraw amount 0.05 TON
            </div>
            <button class="w-full btn-gradient text-white font-bold py-4 rounded-2xl flex justify-between px-6 mb-3">
                <span><i class="fas fa-download mr-2"></i> Withdraw</span>
                <i class="fas fa-chevron-right"></i>
            </button>
            <button class="w-full bg-gray-700/50 text-gray-300 font-bold py-4 rounded-2xl flex justify-between px-6">
                <span><i class="fas fa-history mr-2"></i> History</span>
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- 4. INVITE PAGE -->
    <div id="invite" class="page p-5 text-center">
        <h2 class="text-2xl font-bold mb-8">Invite Friends</h2>
        <div class="bg-gray-800/40 border border-gray-700 rounded-3xl p-6 mb-4">
            <p class="text-sm text-gray-400 mb-4">Your Invite Link</p>
            <div class="bg-black/30 p-3 rounded-xl border border-dashed border-gray-600 text-xs text-teal-400 break-all mb-4">
                https://t.me/OxTonBot?start=user123
            </div>
            <div class="flex gap-2">
                <button class="flex-1 bg-teal-500/20 text-teal-400 font-bold py-3 rounded-xl border border-teal-500/30">Copy Link</button>
                <button class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl">Share</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 w-full bg-[#0b1a2d] border-t border-gray-800 flex py-3 px-2">
        <button onclick="navTo('home')" class="nav-btn active" id="n-home"><i class="fas fa-home text-lg"></i>HOME</button>
        <button onclick="navTo('tasks')" class="nav-btn" id="n-tasks"><i class="fas fa-tasks text-lg"></i>TASKS</button>
        <button onclick="navTo('wallet')" class="nav-btn" id="n-wallet"><i class="fas fa-wallet text-lg"></i>WALLET</button>
        <button onclick="navTo('invite')" class="nav-btn" id="n-invite"><i class="fas fa-users text-lg"></i>INVITE</button>
    </nav>

    <script>
        let board = ["","","","","","","","",""];
        let isGameOver = false;

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-' + id).classList.add('active');
        }

        function gameMove(idx) {
            if(board[idx] !== "" || isGameOver) return;
            
            const cells = document.querySelectorAll('.grid-cell');
            board[idx] = "X";
            cells[idx].innerText = "✕";
            cells[idx].classList.add('text-teal-400');

            // Robot ရွှေ့မယ် (ရိုးရှင်းအောင်)
            setTimeout(() => {
                let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                if(empty.length > 0) {
                    let move = empty[Math.floor(Math.random() * empty.length)];
                    board[move] = "O";
                    cells[move].innerText = "○";
                    cells[move].classList.add('text-white');
                }
            }, 400);
        }
    </script>
</body>
  </html>
